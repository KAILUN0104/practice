<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁前端設計 | 林楷倫</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;900&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ECECEC;
            --text-color: #121212;
            --line-color: #A0A0A0; 
            --transition-smooth: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding: 4vw;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 25px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            line-height: 1;
        }

        header p {
            color: var(--line-color);
            font-size: 0.85rem;
            font-weight: 300;
            margin: 10px 0 0 0;
            letter-spacing: 1px;
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        .project-link-block {
            display: block;
            padding: 10px 15px;
            background: transparent;
            color: var(--text-color);
            text-decoration: none;
            border: 1px solid var(--line-color);
            font-family: var(--font-mono);
            font-weight: 300;
            font-size: 0.75rem;
            transition: var(--transition-smooth);
            text-transform: uppercase;
        }

        .project-link-block:hover {
            background: #F5F5F5;
            transform: translateY(-3px);
        }

        .app-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .sidebar {
            flex: 0 0 260px;
            background: transparent;
            border-left: 1px solid var(--line-color);
            padding: 0 0 0 20px;
            position: sticky;
            top: 50px;
        }

        .sidebar-title {
            font-size: 0.75rem;
            color: var(--text-color);
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 900;
            font-family: var(--font-mono);
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            border-top: 1px solid var(--line-color);
        }

        .menu-item {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            border-bottom: 1px solid var(--line-color);
            padding: 15px 0;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 300;
            color: var(--text-color);
            transition: var(--transition-smooth);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-main);
            text-transform: uppercase;
        }

        .menu-item:hover {
            padding-left: 10px;
            background: #F5F5F5;
        }

        .menu-item.active {
            font-weight: 900;
            padding-left: 10px;
        }

        .menu-item .date {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--line-color);
        }

        .main-content {
            flex: 1;
            background: transparent;
            border-left: 1px solid var(--line-color);
            padding: 0 0 40px 40px;
            min-height: 500px;
            animation: fadeIn 0.4s ease-out;
            position: relative;
        }

        .main-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 30px;
            height: 1px;
            background: var(--line-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-header {
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .content-header h2 {
            font-size: clamp(2rem, 4vw, 3.5rem);
            font-weight: 900;
            margin: 0 0 10px 0;
            color: var(--text-color);
            line-height: 1;
            font-family: var(--font-mono);
        }

        .content-header .topic {
            font-size: 1.5rem;
            color: var(--text-color);
            font-weight: 100;
            text-transform: uppercase;
        }

        @media (max-width: 850px) {
            .app-layout {
                flex-direction: column;
            }
            .sidebar {
                flex: none;
                width: 100%;
                position: static;
                border-left: none;
                padding-left: 0;
            }
            .main-content {
                border-left: none;
                padding-left: 0;
            }
            .main-content::before {
                display: none;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .desc { 
            color: var(--text-color); 
            margin-bottom: 20px; 
            font-size: 1rem; 
            font-weight: 300;
            line-height: 1.6; 
            max-width: 600px;
        }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        
        a.btn { 
            padding: 10px 20px; 
            background: transparent; 
            color: var(--text-color); 
            text-decoration: none; 
            font-size: 0.75rem; 
            font-family: var(--font-mono);
            font-weight: 300; 
            border: 1px solid var(--line-color); 
            transition: var(--transition-smooth); 
            text-transform: uppercase;
        }
        a.btn:hover { 
            background: #F5F5F5; 
            transform: translateY(-2px); 
        }
        
        img { 
            max-width: 100%; 
            height: auto; 
            display: block; 
            margin-top: 20px; 
            filter: grayscale(100%); 
            transition: var(--transition-smooth); 
            border: 1px solid var(--line-color);
        }
        img:hover { filter: grayscale(0%); }
        
        .vue-box { 
            margin-top: 30px; 
            padding: 30px; 
            background: transparent; 
            border: 1px solid var(--line-color); 
            text-align: left; 
        }
        .vue-msg { 
            font-size: 1.5rem; 
            font-weight: 100; 
            margin: 0 0 20px 0; 
            color: var(--text-color); 
        }
        
        button.btn-action { 
            background: transparent; 
            color: var(--text-color); 
            border: 1px solid var(--line-color); 
            padding: 10px 20px; 
            font-size: 0.75rem; 
            font-family: var(--font-mono);
            font-weight: 300; 
            cursor: pointer; 
            transition: var(--transition-smooth); 
            text-transform: uppercase;
        }
        button.btn-action:hover { background: #F5F5F5; }
        
        .experiment-section { 
            margin-top: 40px; 
            padding-top: 20px; 
            border-top: 1px solid var(--line-color); 
        }
        .experiment-title { 
            font-size: 1rem; 
            font-weight: 900; 
            color: var(--text-color); 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }
        .color-box { 
            width: 100%; 
            height: 100px; 
            background-color: #ECECEC; 
            border: 1px solid var(--line-color);
            margin: 10px 0 15px 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-color); 
            font-family: var(--font-mono);
            font-weight: 300; 
            font-size: 0.85rem;
        }
        .color-button { 
            background: transparent; 
            color: var(--text-color); 
            border: 1px solid var(--line-color); 
            padding: 12px; 
            cursor: pointer; 
            font-family: var(--font-mono);
            font-weight: 300; 
            width: 100%; 
            transition: var(--transition-smooth);
            text-transform: uppercase;
        }
        .color-button:hover { background: #F5F5F5; }
        
        .timer-display { 
            font-size: 4rem; 
            font-weight: 100; 
            text-align: center; 
            color: var(--text-color); 
            background: transparent; 
            border: 1px solid var(--line-color);
            padding: 20px; 
            margin: 15px 0; 
            font-family: var(--font-mono); 
            line-height: 1;
        }
        .timer-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .timer-buttons button { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid var(--line-color); 
            background: transparent;
            cursor: pointer; 
            font-family: var(--font-mono);
            font-weight: 300; 
            color: var(--text-color); 
            transition: var(--transition-smooth);
            text-transform: uppercase;
        }
        .timer-buttons button:hover { background: #F5F5F5; }
        
        .clock-display { 
            background: transparent; 
            color: var(--text-color); 
            padding: 30px; 
            border: 1px solid var(--line-color); 
            text-align: center; 
            font-family: var(--font-mono); 
            font-weight: 100;
            font-size: 2rem; 
            margin: 15px 0; 
        }
        .progress-container { 
            width: 100%; 
            height: 40px; 
            background: transparent; 
            border: 1px solid var(--line-color); 
            margin: 15px 0; 
            position: relative;
        }
        .progress-bar { 
            height: 100%; 
            background: var(--line-color); 
            width: 0%; 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            padding-right: 10px;
            color: var(--bg-color); 
            font-family: var(--font-mono);
            font-weight: 400; 
            font-size: 0.8rem; 
            transition: width 0.1s linear; 
        }
        .progress-button { 
            background: transparent; 
            color: var(--text-color); 
            border: 1px solid var(--line-color); 
            padding: 12px; 
            cursor: pointer; 
            font-family: var(--font-mono);
            font-weight: 300; 
            width: 100%; 
            margin-top: 10px; 
            transition: var(--transition-smooth);
            text-transform: uppercase;
        }
        .progress-button:hover { background: #F5F5F5; }
        
        .empty-state { 
            color: var(--line-color); 
            text-align: left; 
            padding: 40px 0; 
            font-family: var(--font-mono);
            font-weight: 300; 
            text-transform: uppercase; 
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>網站前端技術應用</h1>
                <p>STUDENT // 11128217 林楷倫</p>
            </div>
            <a href="index.html" class="project-link-block">HOME</a>
        </header>

        <div class="app-layout">
            
            <aside class="sidebar">
                <div class="sidebar-title">Course Progress</div>
                <ul class="menu-list" id="menuList">
                    </ul>
            </aside>

            <main class="main-content" id="mainContent">
                </main>

        </div>
    </div>

    <script>
        // =========================================
        // 核心資料結構：集中管理所有每週內容
        // =========================================
        const courseData = [
            {
                date: '02/26',
                topic: '基礎 HTML & Vue.js',
                content: `
                    <p class="desc">學習基礎標籤、外部連結，並初步導入 Vue.js 進行狀態切換測試。</p>
                    <div class="btn-group">
                        <a href="https://www.google.com" target="_blank" class="btn">前往 Google</a>
                        <a href="https://www.youtube.com" target="_blank" class="btn">前往 YouTube</a>
                        <a href="about.html" class="btn">關於我們</a>
                        <a href="https://pages.github.com/" target="_blank" class="btn">GitHub Pages 文件</a>
                    </div>
                    <img src="https://picsum.photos/800/300" alt="示例圖片">
                    <div id="app" class="vue-box">
                        <h3 class="vue-msg">{{ message }}</h3>
                        <button @click="changeMessage" class="btn-action">觸發狀態變更</button>
                    </div>
                `
            },
            {
                date: '03/05',
                topic: '個人檔案連結實作',
                content: `
                    <p class="desc">本週練習建立個人檔案頁面導覽與站內連結。</p>
                    <div class="btn-group">
                        <a href="profile.html" class="btn">進入個人檔案 (Profile)</a>
                    </div>
                `
            },
            {
                date: '03/12',
                topic: '修改主要練習網頁',
                content: `
                     <p class="desc">本週練習優化網站練習頁面與了解 Flex box、Grid、RWD 響應式網頁設計的概念。</p>
                `
            },
            {
                date: '03/19',
                topic: 'JavaScript 實驗五合一',
                content: `
                    <p class="desc">學習 JavaScript 基本語法與 DOM 操作，包含 5 個實驗項目。</p>

                    <div class="experiment-section">
                        <div class="experiment-title">實驗二：DOM 操作 - 改變背景顏色</div>
                        <div class="color-box" id="colorBox">點擊下方按鈕改變顏色</div>
                        <button class="color-button" onclick="changeBackgroundColor()">隨機改變背景顏色</button>
                    </div>

                    <div class="experiment-section">
                        <div class="experiment-title">實驗三：倒數計時器</div>
                        <div class="timer-display" id="timerDisplay">10</div>
                        <div class="timer-buttons">
                            <button class="btn-start" onclick="startTimer()">開始倒數</button>
                            <button class="btn-pause" onclick="pauseTimer()">暫停</button>
                            <button class="btn-cancel" onclick="cancelTimer()">取消</button>
                        </div>
                    </div>

                    <div class="experiment-section">
                        <div class="experiment-title">實驗四：數位時鐘</div>
                        <div class="clock-display" id="clockDisplay">00:00:00</div>
                    </div>

                    <div class="experiment-section">
                        <div class="experiment-title">實驗五：進度條 (5秒完成)</div>
                        <div class="progress-container">
                            <div class="progress-bar" id="progressBar">0%</div>
                        </div>
                        <button class="progress-button" id="startProgressBtn" onclick="startProgress()">開始進度條</button>
                    </div>
                `
            },
            {
                date: '03/26',
                topic: '內嵌式網頁',
                content: `
                    <p class="desc">將 0326.html 的內容以外部嵌入 (iframe) 方式放置於此實作內容中。</p>
                    <iframe src="0326.html" width="100%" height="600" style="border:1px solid var(--line-color); border-radius: 0;"></iframe>
                `
            },
            {
                date: '04/02',
                topic: 'Vue基本知識',
                content: `
                    <p class="desc">暫無內容</p>
                `
            },
            {
                date: '04/09',
                topic: '學習基本 Vue 架構',
                content: `
                    <p class="desc">學習基本 Vue 架構，並進行 Node.js 與 NVM 安裝環境設定。</p>
                    <iframe src="0409.html" width="100%" height="800" style="border:1px solid var(--line-color); border-radius: 0;"></iframe>
                `
            }
        ];

        // 自動生成未來的空日期
        const futureDates = [ '04/16', '04/23', '04/30', '05/07', '05/14', '05/21', '05/28', '06/04'];
        futureDates.forEach(date => {
            const topic = date === '06/04' ? '期末統整與專題' : '每週練習主題';
            courseData.push({
                date: date,
                topic: topic,
                content: `<div class="empty-state">尚無內容 DATA PENDING</div>`
            });
        });

        // =========================================
        // 渲染邏輯
        // =========================================
        const menuList = document.getElementById('menuList');
        const mainContent = document.getElementById('mainContent');
        let vueAppInstance = null; // 用來存儲 Vue 實例，方便卸載與重新掛載

        function renderMenu() {
            menuList.innerHTML = '';
            courseData.forEach((item, index) => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = 'menu-item';
                // 預設選中 03/19 (索引3) 或最新的實驗
                if (index === 3) btn.classList.add('active'); 
                
                btn.innerHTML = `<span class="topic-name">${item.topic}</span> <span class="date">${item.date}</span>`;
                btn.onclick = () => selectContent(index, btn);
                
                li.appendChild(btn);
                menuList.appendChild(li);
            });
        }

        function selectContent(index, btnElement) {
            // 移除所有 active 狀態
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            const data = courseData[index];
            
            // 重新觸發動畫 (移除 DOM 再加回去)
            mainContent.style.animation = 'none';
            mainContent.offsetHeight; /* 觸發重繪 */
            mainContent.style.animation = null; 

            // 寫入內容
            mainContent.innerHTML = `
                <div class="content-header">
                    <h2>${data.date}</h2>
                    <div class="topic">${data.topic}</div>
                </div>
                <div class="content-body">
                    ${data.content}
                </div>
            `;

            // 如果切換到的頁面包含 Vue 元素 (#app)，需要重新掛載 Vue
            if (data.date === '02/26') {
                mountVueApp();
            } else if (vueAppInstance) {
                vueAppInstance.unmount();
                vueAppInstance = null;
            }
        }

        // 初始化
        renderMenu();
        // 預設載入 03/19 的內容
        selectContent(3, menuList.children[3].querySelector('button'));

        // =========================================
        // 實驗邏輯功能 (維持原樣)
        // =========================================
        function changeBackgroundColor() {
            const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#34495e', '#e67e22'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const box = document.getElementById('colorBox');
            if(box) {
                box.style.backgroundColor = randomColor;
                box.textContent = `背景顏色: ${randomColor}`;
            }
        }

        let timerInterval = null;
        let timerTime = 10;
        let timerRunning = false;

        function startTimer() {
            if (timerRunning) return;
            timerRunning = true;
            timerInterval = setInterval(() => {
                const display = document.getElementById('timerDisplay');
                if(!display) { clearInterval(timerInterval); return; } // 防呆：切換頁面後停止
                
                if (timerTime > 0) {
                    timerTime--;
                    display.textContent = timerTime;
                } else {
                    clearInterval(timerInterval);
                    timerRunning = false;
                    alert('倒數計時完成！');
                }
            }, 1000);
        }

        function pauseTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerRunning = false;
            }
        }

        function cancelTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerTime = 10;
            timerRunning = false;
            const display = document.getElementById('timerDisplay');
            if(display) display.textContent = '10';
        }

        // 數位時鐘 (持續在背景運行即可，只要畫面上存在 clockDisplay 就更新)
        function updateClock() {
            const display = document.getElementById('clockDisplay');
            if (!display) return;
            
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            display.textContent = `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);

        let progressInterval = null;
        function startProgress() {
            const progressBar = document.getElementById('progressBar');
            const startBtn = document.getElementById('startProgressBtn');
            if(!progressBar || !startBtn) return;
            
            startBtn.disabled = true;
            let progress = 0;
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';
            
            progressInterval = setInterval(() => {
                progress += 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(progressInterval);
                    startBtn.disabled = false;
                }
                progressBar.style.width = progress + '%';
                progressBar.textContent = progress + '%';
            }, 50);
        }

        // Vue 應用掛載函數
        function mountVueApp() {
            const { createApp } = Vue;
            vueAppInstance = createApp({
                data() { return { message: "SYSTEM STANDBY: Hello Vue!" }; },
                methods: { changeMessage() { this.message = "STATUS UPDATED: 訊息切換成功。"; } }
            });
            vueAppInstance.mount("#app");
        }
    </script>
</body>
</html>
