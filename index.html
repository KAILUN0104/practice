<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁前端設計 | 林楷倫</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* CSS 變數：精細的灰階色板 */
        :root {
            --black: #111111;
            --dark-gray: #2b2b2b;
            --mid-gray: #757575;
            --light-gray: #e0e0e0;
            --bg-gray: #f7f7f8;
            --white: #ffffff;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.12);
        }

        /* 全域設定與微小點狀網格背景 */
        body {
            background-color: var(--bg-gray);
            background-image: radial-gradient(var(--light-gray) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--black);
            font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            margin: 0;
            padding: 50px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 頂部標題區塊：強調粗體與線條 */
        header {
            border-bottom: 4px solid var(--black);
            padding-bottom: 25px;
            margin-bottom: 50px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            color: var(--mid-gray);
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0;
            letter-spacing: 1px;
        }

        /* CSS Grid 網格佈局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        /* 響應式 */
        @media (max-width: 900px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { 
            .grid-container { grid-template-columns: 1fr; } 
            header { flex-direction: column; align-items: flex-start; gap: 10px; }
            header h1 { font-size: 2.2rem; }
        }

        /* 卡片設計：質感陰影與頂部粗線 */
        .card {
            background-color: var(--white);
            border: 1px solid var(--light-gray);
            border-top: 5px solid var(--black);
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        /* 卡片頭部 (Topic) */
        .card-header {
            padding: 25px 20px 20px;
            border-bottom: 1px solid var(--light-gray);
            background-color: var(--white);
        }

        .card-header h2 {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0 0 5px 0;
            color: var(--black);
            line-height: 1;
        }

        .card-header p {
            font-size: 0.95rem;
            color: var(--mid-gray);
            font-weight: 600;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 卡片下拉區塊 (Details & Summary) */
        details {
            margin-top: auto;
            background-color: #fafafa;
        }

        summary {
            padding: 18px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--dark-gray);
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid transparent;
            transition: background-color 0.3s, color 0.3s;
        }

        summary::-webkit-details-marker { display: none; }

        summary:hover {
            background-color: var(--light-gray);
            color: var(--black);
        }

        /* 加減號 Icon 變更為箭頭 */
        summary .icon::after {
            content: '↓';
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        details[open] summary .icon::after {
            transform: rotate(180deg);
        }

        details[open] summary {
            background-color: var(--black);
            color: var(--white);
            border-top: 1px solid var(--black);
        }

        /* 🌟 下拉展開動畫：淡入與滑動 */
        details[open] summary ~ * {
            animation: slideFadeDown 0.4s ease-out forwards;
        }

        @keyframes slideFadeDown {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 展開後的內容區塊 */
        .content {
            padding: 20px;
            background-color: var(--white);
            border-top: 1px solid var(--light-gray);
        }

        .desc {
            color: var(--dark-gray);
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* 連結按鍵 UI：框線與實心切換 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        a.btn {
            display: block;
            text-align: center;
            padding: 10px 15px;
            background-color: transparent;
            color: var(--black);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: 2px solid var(--black);
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        a.btn:hover {
            background-color: var(--black);
            color: var(--white);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 圖片特效 */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
            margin-top: 15px;
            filter: grayscale(100%) contrast(1.2);
            transition: filter 0.5s ease;
        }

        img:hover {
            filter: grayscale(0%) contrast(1);
        }

        /* Vue 區塊特殊設計：深灰底色 */
        .vue-box {
            margin-top: 20px;
            padding: 20px;
            background-color: var(--bg-gray);
            border-radius: 6px;
            border: 1px solid var(--light-gray);
            text-align: center;
        }

        .vue-msg {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0 0 15px 0;
            color: var(--black);
        }

        button.btn-action {
            background-color: var(--black);
            color: var(--white);
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            width: 100%;
        }

        button.btn-action:hover {
            background-color: var(--dark-gray);
            transform: scale(1.02);
        }

        button.btn-action:active {
            transform: scale(0.98);
        }

        /* 尚未有內容的狀態 */
        .empty-state {
            color: var(--mid-gray);
            font-size: 0.9rem;
            text-align: center;
            padding: 30px 20px;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                #f0f0f0 10px,
                #f0f0f0 20px
            );
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>網站前端技術應用</h1>
            <p>STUDENT // 11128217 林楷倫</p>
        </header>

        <div class="grid-container">

            <div class="card">
                <div class="card-header">
                    <h2>02/26</h2>
                    <p>基礎 HTML & Vue.js</p>
                </div>
                <details open>
                    <summary>實作內容 <span class="icon"></span></summary>
                    <div class="content">
                        <p class="desc">學習基礎標籤、外部連結，並初步導入 Vue.js 進行狀態切換測試。</p>
                        <div class="btn-group">
                            <a href="https://www.google.com" target="_blank" class="btn">前往 Google</a>
                            <a href="https://www.youtube.com" target="_blank" class="btn">前往 YouTube</a>
                            <a href="about.html" class="btn">關於我們</a>
                            <a href="https://pages.github.com/" target="_blank" class="btn">GitHub Pages 文件</a>
                        </div>
                        <img src="https://picsum.photos/400/250" alt="示例圖片">
                        
                        <div id="app" class="vue-box">
                            <h3 class="vue-msg">{{ message }}</h3>
                            <button @click="changeMessage" class="btn-action">觸發狀態變更</button>
                        </div>
                    </div>
                </details>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>03/05</h2>
                    <p>個人檔案連結實作</p>
                </div>
                <details>
                    <summary>實作內容 <span class="icon"></span></summary>
                    <div class="content">
                        <p class="desc">本週練習建立個人檔案頁面導覽與站內連結。</p>
                        <div class="btn-group">
                            <a href="profile.html" class="btn">個人檔案 (Profile)</a>
                        </div>
                    </div>
                </details>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>03/12</h2>
                    <p>修改主要練習網頁</p>
                </div>
                <details>
                    <summary>實作內容 <span class="icon"></span></summary>
                    <div class="content">
                         <p class="desc">本週練習優化網站練習頁面與了解Flex box、Grid、RWD。</p>
                    </div>
                </details>
            </div>

            <script>
                const gridContainer = document.querySelector('.grid-container');
                const futureDates = ['03/19', '03/26', '04/02', '04/09', '04/16', '04/23', '04/30', '05/07', '05/14', '05/21', '05/28', '06/04'];
                
                futureDates.forEach(date => {
                    let cardHTML;
                    
                    if (date === '03/19') {
                        cardHTML = `
                            <div class="card">
                                <div class="card-header">
                                    <h2>${date}</h2>
                                    <p>JavaScript 基本概念</p>
                                </div>
                                <details open>
                                    <summary>實作內容 <span class="icon"></span></summary>
                                    <div class="content">
                                        <p class="desc">學習 JavaScript 基本語法，第一練習：撰寫函式計算圓的面積，參數為半徑 (radius)。</p>
                                        <div class="btn-group">
                                            <a href="javascript:void(0)" class="btn" onclick="exampleCalculateArea()">執行計算範例</a>
                                        </div>
                                        <div id="result-box" style="margin-top: 20px; padding: 15px; background-color: #fafafa; border-radius: 4px; border-left: 4px solid #111111; display: none;">
                                            <strong>計算結果：</strong>
                                            <p id="result-output" style="margin: 10px 0 0 0; color: #2b2b2b;"></p>
                                        </div>
                                        <pre style="background-color: #f5f5f5; padding: 15px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;">
<code>// 圓面積計算函式
function calculateCircleArea(radius) {
    if (radius < 0) {
        return '半徑不能為負數';
    }
    const area = Math.PI * radius * radius;
    return area.toFixed(2);
}

// 使用範例
const radius = 5;
const area = calculateCircleArea(radius);
console.log(\`半徑 \${radius} 的圓面積為: \${area}\`);</code>
                                        </pre>
                                    </div>
                                </details>
                            </div>
                        `;
                    } else {
                        const topic = date === '06/04' ? '期末統整與專題' : '每週練習主題';
                        cardHTML = `
                            <div class="card">
                                <div class="card-header">
                                    <h2>${date}</h2>
                                    <p>${topic}</p>
                                </div>
                                <details>
                                    <summary>實作內容 <span class="icon"></span></summary>
                                    <div class="content empty-state">尚無內容 DATA PENDING</div>
                                </details>
                            </div>
                        `;
                    }
                    
                    gridContainer.insertAdjacentHTML('beforeend', cardHTML);
                });
            </script>

        </div>
    </div>

    <script>
        // 圓面積計算函式 - 3/19 練習
        function calculateCircleArea(radius) {
            if (radius < 0) {
                return '半徑不能為負數';
            }
            const area = Math.PI * radius * radius;
            return area.toFixed(2);
        }

        // 執行範例
        function exampleCalculateArea() {
            const radius = 5;
            const area = calculateCircleArea(radius);
            const resultBox = document.getElementById('result-box');
            const resultOutput = document.getElementById('result-output');
            resultOutput.textContent = `半徑 ${radius} 的圓面積為: ${area} 平方單位`;
            resultBox.style.display = 'block';
        }

        // Vue 應用
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    message: "SYSTEM STANDBY: Hello Vue!"
                };
            },
            methods: {
                changeMessage() {
                    this.message = "STATUS UPDATED: 訊息切換成功。";
                }
            }
        }).mount("#app");
    </script>
</body>
</html>
