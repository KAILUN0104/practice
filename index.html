<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁前端設計 | 林楷倫</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* CSS 變數設定 */
        :root {
            --black: #000000;
            --dark-gray: #333333;
            --gray: #888888;
            --light-gray: #e5e5e5;
            --white: #ffffff;
        }

        /* 全域重置與基礎字體 */
        body {
            background-color: var(--white);
            color: var(--black);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 頂部標題區塊 */
        header {
            border-bottom: 3px solid var(--black);
            padding-bottom: 20px;
            margin-bottom: 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
        }

        header p {
            color: var(--gray);
            font-size: 1.1rem;
            margin: 0;
        }

        /* CSS Grid 網格佈局 (一列三個) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        /* 響應式設計：小螢幕時變為單列或雙列 */
        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }

        /* 卡片設計 */
        .card {
            border: 2px solid var(--black);
            display: flex;
            flex-direction: column;
            background-color: var(--white);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 5px 5px 0px var(--black);
        }

        /* 卡片標題區 (Topic) */
        .card-header {
            padding: 20px;
            border-bottom: 1px solid var(--black);
        }

        .card-header h2 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header p {
            font-size: 0.95rem;
            color: var(--dark-gray);
            font-weight: bold;
            margin: 0;
        }

        /* 卡片下拉區塊 (Details) */
        details {
            margin-top: auto; /* 將下拉區塊推至卡片底部 */
        }

        summary {
            background-color: var(--black);
            color: var(--white);
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s ease;
        }

        summary::-webkit-details-marker {
            display: none; /* 隱藏預設三角形 */
        }

        summary:hover {
            background-color: var(--dark-gray);
        }

        /* 加減號 Icon */
        summary .icon::after {
            content: '+';
            font-size: 1.2rem;
        }

        details[open] summary .icon::after {
            content: '-';
        }

        /* 展開後的內容區塊 */
        .content {
            padding: 20px;
            background-color: #fafafa;
            border-top: 1px solid var(--black);
        }

        .desc {
            color: var(--dark-gray);
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        /* 連結按鍵 UI */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        a.btn {
            display: block;
            text-align: center;
            padding: 8px 15px;
            background-color: transparent;
            color: var(--black);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border: 1px solid var(--black);
            transition: all 0.3s ease;
        }

        a.btn:hover {
            background-color: var(--black);
            color: var(--white);
        }

        /* 圖片特效 */
        img {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--black);
            display: block;
            margin-top: 10px;
            filter: grayscale(100%);
            transition: filter 0.4s ease;
        }

        img:hover {
            filter: grayscale(0%);
        }

        /* Vue 區塊特殊設計 */
        .vue-box {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--gray);
            text-align: center;
        }

        button.btn-action {
            background-color: var(--black);
            color: var(--white);
            border: none;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        button.btn-action:hover {
            background-color: var(--gray);
        }

        .vue-msg {
            font-size: 1.1rem;
            margin: 0 0 10px 0;
            color: var(--dark-gray);
        }

        /* 尚未有內容的狀態 */
        .empty-state {
            color: var(--gray);
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>網頁前端設計</h1>
            <p>每週課程練習紀錄 | 學生：林楷倫</p>
        </header>

        <div class="grid-container">

            <div class="card">
                <div class="card-header">
                    <h2>02/26</h2>
                    <p>基礎 HTML 與 Vue.js 互動</p>
                </div>
                <details open>
                    <summary>實作內容與連結 <span class="icon"></span></summary>
                    <div class="content">
                        <p class="desc">這是一個 HTML 教學範例。學習了基礎標籤、外部連結，並導入 Vue.js 進行狀態切換測試。</p>
                        <div class="btn-group">
                            <a href="https://www.google.com" target="_blank" class="btn">前往 Google</a>
                            <a href="https://www.youtube.com" target="_blank" class="btn">前往 YouTube</a>
                            <a href="about.html" class="btn">關於我們</a>
                            <a href="https://pages.github.com/" target="_blank" class="btn">GitHub Pages 文件</a>
                        </div>
                        <img src="https://picsum.photos/200/150" alt="示例圖片">
